services:
  - name: tunisia-real-estate
    github:
      repo: Kirazul/TunisiaRealEstate_ML
    branch: master
    buildCommand: pip install -r api/requirements.txt
    startCommand: uvicorn api.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: GROQ_API_KEY
        generateValue: false
        sync: false
    plan: free
    region: frankfurt