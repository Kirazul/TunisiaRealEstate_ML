<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tunisia Real Estate AI Rapport</title>
    <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
    <link rel="stylesheet" href="css/style.css?v=4.0">
    <style>
        body.rapport-body {
            overflow: hidden;
            min-height: 100vh;
            background:
                radial-gradient(circle at 18% 16%, rgba(239, 68, 68, 0.16), transparent 22%),
                radial-gradient(circle at 82% 78%, rgba(255, 255, 255, 0.05), transparent 20%),
                #000;
        }
        .rapport-shell {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            padding: 6.25rem 2.25vw 1.25rem;
        }
        .rapport-stage {
            position: relative;
            width: 100%;
            height: calc(100vh - 7.5rem);
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
            background:
                radial-gradient(circle at top right, rgba(239,68,68,0.16), transparent 24%),
                linear-gradient(180deg, rgba(15,15,20,0.96), rgba(5,5,8,0.98));
            box-shadow: 0 28px 90px rgba(0,0,0,0.44);
        }
        .rapport-stage::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 3;
            background: linear-gradient(135deg, rgba(255,255,255,0.04), transparent 20%, transparent 78%, rgba(239,68,68,0.08));
        }
        .rapport-topline {
            position: absolute;
            top: 1rem;
            left: 1rem;
            right: 1rem;
            z-index: 4;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            pointer-events: none;
        }
        .rapport-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.55rem;
            padding: 0.58rem 0.84rem;
            border-radius: 999px;
            background: rgba(0,0,0,0.52);
            border: 1px solid rgba(255,255,255,0.08);
            color: #fff;
            font-size: 0.63rem;
            font-weight: 800;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            backdrop-filter: blur(12px);
        }
        .rapport-badge::before {
            content: "";
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 12px rgba(239,68,68,0.65);
        }
        .rapport-frame-wrap {
            position: absolute;
            inset: 0;
            z-index: 1;
            background: #07070b;
        }
        .rapport-frame {
            width: 100%;
            height: 100%;
            border: 0;
            background: #0a0a0f;
        }
        .rapport-controls {
            position: absolute;
            right: 1rem;
            bottom: 1rem;
            z-index: 4;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .rapport-control-btn {
            min-width: 142px;
            justify-content: center;
        }
        .rapport-fallback {
            position: absolute;
            left: 1rem;
            bottom: 1rem;
            z-index: 4;
            max-width: min(560px, calc(100% - 18rem));
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.9rem 1rem;
            border-radius: 18px;
            background: rgba(0,0,0,0.56);
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(14px);
        }
        .rapport-fallback p {
            margin: 0;
            color: rgba(255,255,255,0.8);
            font-size: 0.82rem;
            line-height: 1.5;
        }
        .rapport-stage.is-fullscreen {
            width: 100vw;
            height: 100vh;
            border-radius: 0;
        }
        body.rapport-fullscreen .top-nav {
            display: none;
        }
        @media (max-width: 900px) {
            .rapport-shell {
                padding: 5.5rem 1rem 1rem;
            }
            .rapport-stage {
                height: calc(100vh - 6.5rem);
                border-radius: 20px;
            }
            .rapport-fallback {
                max-width: calc(100% - 2rem);
                right: 1rem;
            }
            .rapport-controls {
                left: 1rem;
                right: 1rem;
                justify-content: stretch;
            }
            .rapport-control-btn {
                min-width: 0;
                flex: 1 1 180px;
            }
        }
    </style>
</head>
<body class="rapport-body">
    <div id="bg-layer"></div>
    <div id="vignette"></div>

    <div class="top-nav">
        <a href="/" class="nav-btn" id="btn-back-home">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"></path></svg>
            <span>ATLAS</span>
        </a>
        <a href="/presentation" class="nav-btn presentation-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4h18v12H3z"></path><path d="M8 20h8"></path><path d="M12 16v4"></path></svg>
            <span>PRESENTATION</span>
        </a>
        <a href="/notebook" class="nav-btn primary">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
            <span>ML LAB</span>
        </a>
    </div>

    <main class="rapport-shell">
        <section class="rapport-stage glass" id="rapport-stage">
            <div class="rapport-topline">
                <span class="rapport-badge">Technical Report</span>
                <span class="rapport-badge">Embedded PDF Viewer</span>
            </div>
            <div class="rapport-frame-wrap">
                <iframe
                    class="rapport-frame"
                    src="/rapport/pdf#zoom=100"
                    title="Tunisia Real Estate AI Rapport"
                    loading="eager">
                </iframe>
            </div>
            <div class="rapport-controls">
                <button type="button" class="nav-btn presentation-btn rapport-control-btn" id="btn-rapport-fullscreen">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"></path><path d="M16 3h3a2 2 0 0 1 2 2v3"></path><path d="M8 21H5a2 2 0 0 1-2-2v-3"></path><path d="M16 21h3a2 2 0 0 0 2-2v-3"></path></svg>
                    <span>FULLSCREEN</span>
                </button>
                <a href="/rapport/pdf" target="_blank" rel="noopener noreferrer" class="nav-btn primary rapport-control-btn">OPEN PDF</a>
                <a href="/rapport/pdf" download class="nav-btn rapport-control-btn">DOWNLOAD</a>
            </div>
        </section>
    </main>
    <script>
        const stage = document.getElementById('rapport-stage');
        const fullscreenBtn = document.getElementById('btn-rapport-fullscreen');

        async function toggleRapportFullscreen() {
            if (!stage) return;
            if (document.fullscreenElement === stage) {
                await document.exitFullscreen();
                return;
            }
            await stage.requestFullscreen();
        }

        if (fullscreenBtn) {
            fullscreenBtn.addEventListener('click', () => {
                toggleRapportFullscreen().catch(() => {
                    window.open('/rapport/pdf', '_blank', 'noopener,noreferrer');
                });
            });
        }

        document.addEventListener('fullscreenchange', () => {
            const isFullscreen = document.fullscreenElement === stage;
            stage.classList.toggle('is-fullscreen', isFullscreen);
            document.body.classList.toggle('rapport-fullscreen', isFullscreen);
            if (fullscreenBtn) {
                fullscreenBtn.querySelector('span').textContent = isFullscreen ? 'EXIT FULLSCREEN' : 'FULLSCREEN';
            }
        });
    </script>
</body>
</html>
