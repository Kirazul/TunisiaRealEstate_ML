<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        body.presentation-body {
            overflow: hidden;
            min-height: 100vh;
            background:
                radial-gradient(circle at 18% 16%, rgba(239, 68, 68, 0.16), transparent 22%),
                radial-gradient(circle at 82% 78%, rgba(255, 255, 255, 0.06), transparent 20%),
                #000;
        }
        .presentation-shell {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            padding: 6.25rem 3vw 2rem;
        }
        .presentation-stage {
            position: relative;
            width: 100%;
            height: calc(100vh - 8.25rem);
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
            background:
                radial-gradient(circle at top right, rgba(239,68,68,0.16), transparent 24%),
                linear-gradient(180deg, rgba(15,15,20,0.96), rgba(5,5,8,0.98));
            box-shadow: 0 28px 90px rgba(0,0,0,0.44);
        }
        .presentation-stage::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 3;
            background: linear-gradient(135deg, rgba(255,255,255,0.04), transparent 20%, transparent 78%, rgba(239,68,68,0.08));
        }
        .presentation-topline {
            position: absolute;
            top: 1rem;
            left: 1rem;
            right: 1rem;
            z-index: 4;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            pointer-events: none;
        }
        .presentation-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.55rem;
            padding: 0.58rem 0.84rem;
            border-radius: 999px;
            background: rgba(0,0,0,0.52);
            border: 1px solid rgba(255,255,255,0.08);
            color: #fff;
            font-size: 0.63rem;
            font-weight: 800;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            backdrop-filter: blur(12px);
        }
        .presentation-badge::before {
            content: "";
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 12px rgba(239,68,68,0.65);
        }
        .presentation-frame-wrap {
            position: absolute;
            inset: 0;
            padding-top: 0;
        }
        .presentation-frame {
            width: 100%;
            height: 100%;
            border: 0;
            background: #0a0a0f;
        }
        .presentation-fallback {
            position: absolute;
            left: 1.25rem;
            right: 1.25rem;
            bottom: 1.25rem;
            z-index: 4;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.95rem 1rem;
            border-radius: 18px;
            background: rgba(0,0,0,0.56);
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(14px);
        }
        .presentation-fallback p {
            color: #cbd5e1;
            font-size: 0.8rem;
            line-height: 1.5;
        }
        .presentation-actions {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .presentation-actions .nav-btn {
            justify-content: center;
        }
        @media (max-width: 860px) {
            .presentation-shell {
                padding: 5.6rem 1rem 1rem;
            }
            .presentation-stage {
                height: calc(100vh - 6.8rem);
                border-radius: 22px;
            }
            .presentation-fallback {
                flex-direction: column;
                align-items: stretch;
            }
            .presentation-actions {
                justify-content: stretch;
            }
            .presentation-actions .nav-btn {
                flex: 1 1 auto;
            }
        }
    </style>
</head>
